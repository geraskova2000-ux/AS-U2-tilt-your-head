<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Head Turn Words</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif;
    background:
      radial-gradient(circle at 10% 15%, rgba(255,255,255,.9) 0 18px, transparent 19px),
      radial-gradient(circle at 18% 12%, rgba(255,255,255,.75) 0 14px, transparent 15px),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,.8) 0 24px, transparent 25px),
      radial-gradient(circle at 88% 17%, rgba(255,255,255,.65) 0 16px, transparent 17px),
      linear-gradient(135deg, #dff8ff, #fff3c9 45%, #ffe1ef);
    overflow: hidden;
    color: #24304f;
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(circle, rgba(255, 209, 92, .85) 0 3px, transparent 4px),
      radial-gradient(circle, rgba(136, 199, 255, .7) 0 3px, transparent 4px),
      radial-gradient(circle, rgba(255, 145, 191, .7) 0 2px, transparent 3px);
    background-size: 120px 120px, 160px 160px, 90px 90px;
    background-position: 20px 30px, 60px 80px, 100px 40px;
    animation: floatStars 10s linear infinite;
  }

  @keyframes floatStars {
    from { transform: translateY(0); }
    to { transform: translateY(-40px); }
  }

  .app {
    width: min(1180px, 96vw);
    height: 96vh;
    margin: 2vh auto;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 14px;
    position: relative;
    z-index: 1;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    background: rgba(255,255,255,.75);
    border: 4px solid rgba(255,255,255,.95);
    border-radius: 28px;
    box-shadow: 0 12px 28px rgba(86, 76, 118, .18);
    backdrop-filter: blur(6px);
  }

  .title {
    font-size: clamp(26px, 4vw, 48px);
    font-weight: 900;
    letter-spacing: .5px;
  }

  .scoreboard {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: clamp(22px, 3vw, 36px);
    font-weight: 900;
    white-space: nowrap;
  }

  .main {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: clamp(14px, 2.5vw, 34px);
    align-items: center;
    min-height: 0;
  }

  .choice {
    height: min(58vh, 520px);
    border-radius: 40px;
    border: 7px solid white;
    background: rgba(255,255,255,.75);
    box-shadow: 0 18px 35px rgba(72, 62, 110, .18);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    transition: transform .22s ease, box-shadow .22s ease, background .22s ease;
  }

  .choice::before {
    content: "";
    position: absolute;
    inset: 16px;
    border-radius: 30px;
    border: 4px dashed rgba(83, 126, 220, .22);
  }

  .choice .visual {
    position: relative;
    z-index: 2;
    font-size: clamp(120px, 18vw, 250px);
    line-height: 1;
    filter: drop-shadow(0 10px 8px rgba(0,0,0,.12));
  }

  .choice img.visual {
    width: min(72%, 300px);
    height: min(72%, 300px);
    object-fit: contain;
  }

  .choice-label {
    position: absolute;
    bottom: 18px;
    font-size: clamp(24px, 3vw, 40px);
    font-weight: 900;
    color: rgba(36,48,79,.35);
  }

  .choice.active {
    transform: scale(1.035);
    box-shadow: 0 0 0 12px rgba(86, 164, 255, .28), 0 18px 35px rgba(72, 62, 110, .18);
  }

  .choice.correct {
    background: #d9ffd9;
    animation: pop .45s ease;
    box-shadow: 0 0 0 14px rgba(47, 210, 99, .4), 0 18px 35px rgba(72, 62, 110, .18);
  }

  .choice.wrong {
    background: #ffd9e0;
    animation: shake .42s ease;
    box-shadow: 0 0 0 14px rgba(255, 76, 100, .28), 0 18px 35px rgba(72, 62, 110, .18);
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.09) rotate(-2deg); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-14px); }
    40% { transform: translateX(14px); }
    60% { transform: translateX(-10px); }
    80% { transform: translateX(10px); }
  }

  .center-panel {
    width: min(280px, 24vw);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }

  button {
    font-family: inherit;
    border: none;
    cursor: pointer;
    font-weight: 900;
    transition: transform .14s ease, filter .14s ease;
  }

  button:hover {
    transform: translateY(-2px) scale(1.02);
    filter: brightness(1.03);
  }

  button:active {
    transform: translateY(2px) scale(.98);
  }

  .sound-btn {
    width: clamp(100px, 15vw, 175px);
    height: clamp(100px, 15vw, 175px);
    border-radius: 50%;
    font-size: clamp(44px, 7vw, 82px);
    background: linear-gradient(160deg, #ffdb6e, #ff9d5a);
    color: white;
    border: 8px solid white;
    box-shadow: 0 15px 28px rgba(181, 104, 41, .25);
  }

  .start-btn, .again-btn {
    padding: 20px 30px;
    border-radius: 28px;
    font-size: clamp(26px, 4vw, 44px);
    background: linear-gradient(160deg, #8ee58e, #42c9a4);
    color: white;
    border: 7px solid white;
    box-shadow: 0 15px 28px rgba(48, 134, 105, .25);
  }

  .status {
    min-height: 72px;
    text-align: center;
    font-size: clamp(24px, 3vw, 38px);
    font-weight: 900;
    color: #435072;
  }

  .hint {
    text-align: center;
    padding: 10px 16px;
    border-radius: 20px;
    background: rgba(255,255,255,.65);
    font-size: clamp(16px, 2vw, 24px);
    font-weight: 800;
  }

  footer {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
  }

  video {
    width: 180px;
    max-width: 22vw;
    border-radius: 22px;
    border: 5px solid white;
    transform: scaleX(-1);
    box-shadow: 0 12px 24px rgba(72, 62, 110, .18);
    background: #fff;
  }

  .tilt-indicator {
    width: min(380px, 54vw);
    height: 24px;
    background: rgba(255,255,255,.75);
    border-radius: 99px;
    border: 4px solid white;
    position: relative;
    overflow: hidden;
  }

  .tilt-dot {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: #5b9dff;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: left .08s linear;
    box-shadow: 0 4px 10px rgba(37, 89, 174, .3);
  }

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 10;
    background: rgba(255, 246, 252, .86);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal {
    width: min(760px, 94vw);
    padding: 34px;
    border-radius: 42px;
    border: 8px solid white;
    background: linear-gradient(160deg, #ffffff, #fff7d7);
    box-shadow: 0 22px 60px rgba(72, 62, 110, .22);
    text-align: center;
  }

  .modal h1 {
    font-size: clamp(36px, 7vw, 74px);
    margin: 0 0 12px;
  }

  .modal p {
    font-size: clamp(20px, 3vw, 31px);
    font-weight: 800;
    line-height: 1.35;
    margin: 12px 0 28px;
  }

  .hidden {
    display: none !important;
  }

  .word-flash {
    position: fixed;
    left: 50%;
    top: 50%;
    z-index: 20;
    transform: translate(-50%, -50%);
    padding: 28px 44px;
    border-radius: 36px;
    background: rgba(255,255,255,.94);
    border: 7px solid white;
    box-shadow: 0 18px 50px rgba(72, 62, 110, .24);
    font-size: clamp(42px, 8vw, 96px);
    font-weight: 1000;
    color: #2e3a66;
    animation: flashWord 1.05s ease forwards;
    pointer-events: none;
  }

  @keyframes flashWord {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(.7); }
    18% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(.75); }
  }

  .small-note {
    font-size: 16px;
    opacity: .7;
    margin-top: 14px;
  }

  @media (max-width: 820px) {
    body {
      overflow: auto;
    }
    .app {
      height: auto;
      min-height: 100vh;
    }
    .main {
      grid-template-columns: 1fr;
    }
    .center-panel {
      width: 100%;
      order: -1;
      flex-direction: row;
      justify-content: center;
      flex-wrap: wrap;
    }
    .choice {
      height: 240px;
    }
    footer {
      flex-direction: column;
    }
  }
</style>
</head>

<body>
<div class="stars"></div>

<div class="app">
  <header>
    <div class="title">Head Turn Words</div>
    <div class="scoreboard">
      <span id="score">⭐ 0</span>
      <span id="progress">0 / 17</span>
    </div>
  </header>

  <main class="main">
    <section id="leftChoice" class="choice">
      <div class="visual" id="leftVisual">☔</div>
      <div class="choice-label">LEFT</div>
    </section>

    <section class="center-panel">
      <button class="sound-btn" id="soundBtn" title="Listen again">🔊</button>
      <div class="status" id="status">Press Start</div>
      <div class="hint">Tilt your head to the correct picture!</div>
    </section>

    <section id="rightChoice" class="choice">
      <div class="visual" id="rightVisual">🎒</div>
      <div class="choice-label">RIGHT</div>
    </section>
  </main>

  <footer>
    <video id="video" autoplay playsinline muted></video>
    <div class="tilt-indicator">
      <div class="tilt-dot" id="tiltDot"></div>
    </div>
  </footer>
</div>

<div class="overlay" id="startOverlay">
  <div class="modal">
    <h1>🎧 Head Turn Words</h1>
    <p>Listen to the word. Look at the pictures. Tilt your head left or right!</p>
    <button class="start-btn" id="startBtn">Start</button>
    <div class="small-note">The browser will ask for camera access.</div>
  </div>
</div>

<div class="overlay hidden" id="endOverlay">
  <div class="modal">
    <h1>Great job! 🌟</h1>
    <p id="finalScore">You got 0 stars!</p>
    <button class="again-btn" id="againBtn">Play Again</button>
  </div>
</div>

<div id="flashContainer"></div>

  let roundOrder = [];

const TILT_THRESHOLD = 0.14;

  const videoElement = document.getElementById("video");

  const rightChoice = document.getElementById("rightChoice");
  const leftVisual = document.getElementById("leftVisual");
  const rightVisual = document.getElementById("rightVisual");

  function shuffle(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function chooseVoice() {
    const voices = speechSynthesis.getVoices();
    selectedVoice =
      voices.find(v => v.lang === "en-US" && /female|samantha|zira|google/i.test(v.name)) ||
      voices.find(v => v.lang === "en-US") ||
      voices.find(v => v.lang && v.lang.startsWith("en")) ||
      null;
  }

  speechSynthesis.onvoiceschanged = chooseVoice;
  chooseVoice();

  function speak(text) {
    speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "en-US";
    utterance.rate = 0.72;
    utterance.pitch = 1.08;
    utterance.volume = 1;
    if (selectedVoice) utterance.voice = selectedVoice;
    speechSynthesis.speak(utterance);
  }

  function successSound() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523.25, 659.25, 783.99];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = freq;
      osc.type = "sine";
      osc.connect(gain);
      gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.0001, ctx.currentTime + i * 0.08);
      gain.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime + i * 0.08 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + i * 0.08 + 0.18);
      osc.start(ctx.currentTime + i * 0.08);
      osc.stop(ctx.currentTime + i * 0.08 + 0.2);
    });
  }

  function errorSound() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = 180;
    osc.type = "triangle";
    osc.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.11, ctx.currentTime + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.28);
    osc.start();
    osc.stop(ctx.currentTime + 0.3);
  }

  function renderVisual(container, item) {
    container.innerHTML = "";
    if (item.type === "img") {
      const img = document.createElement("img");
      img.src = item.visual;
      img.alt = item.word;
      img.className = "visual";
      container.replaceWith(img);
      return img;
    } else {
      const div = document.createElement("div");
      div.className = "visual";
      div.textContent = item.visual;
      container.replaceWith(div);
      return div;
    }
  }

  function setChoiceVisual(side, item) {
    const choice = side === "left" ? leftChoice : rightChoice;
    const oldVisual = choice.querySelector(".visual");
    if (item.type === "img") {
      const img = document.createElement("img");
      img.src = item.visual;
      img.alt = item.word;
      img.className = "visual";
      oldVisual.replaceWith(img);
    } else {
      const div = document.createElement("div");
      div.className = "visual";
      div.textContent = item.visual;
      oldVisual.replaceWith(div);
    }
  }

  function updateUI() {
    scoreEl.textContent = `⭐ ${score}`;
    progressEl.textContent = `${Math.min(currentRound, words.length)} / ${words.length}`;
  }

  function resetChoiceStyles() {
    leftChoice.classList.remove("active", "correct", "wrong");
    rightChoice.classList.remove("active", "correct", "wrong");
  }

  function startGame() {
    score = 0;
    currentRound = 0;
    roundOrder = shuffle(words);
    gameStarted = true;
    locked = false;
    updateUI();
    nextRound();
  }

  function nextRound() {
    resetChoiceStyles();

    if (currentRound >= roundOrder.length) {
      endGame();
      return;
    }

    currentTarget = roundOrder[currentRound];
    const distractors = words.filter(item => item.word !== currentTarget.word);
    const wrongItem = shuffle(distractors)[0];

    correctSide = Math.random() < 0.5 ? "left" : "right";

    if (correctSide === "left") {
      setChoiceVisual("left", currentTarget);
      setChoiceVisual("right", wrongItem);
    } else {
      setChoiceVisual("left", wrongItem);
      setChoiceVisual("right", currentTarget);
    }

    statusEl.textContent = "Listen!";
    currentRound++;
    updateUI();

    setTimeout(() => speak(currentTarget.word), 350);
  }

  function flashWord(item) {
    const flash = document.createElement("div");
    flash.className = "word-flash";
    flash.textContent = `${item.word.toUpperCase()} ${item.type === "emoji" ? item.visual : ""}`;
    flashContainer.appendChild(flash);
    setTimeout(() => flash.remove(), 1100);
  }

  function chooseSide(side) {
    if (!gameStarted || locked || !currentTarget) return;

    locked = true;
    const chosen = side === "left" ? leftChoice : rightChoice;
    const correct = correctSide === "left" ? leftChoice : rightChoice;

    if (side === correctSide) {
      score++;
      statusEl.textContent = "Great!";
      chosen.classList.add("correct");
      successSound();
    } else {
      statusEl.textContent = "Try again!";
      chosen.classList.add("wrong");
      correct.classList.add("correct");
      errorSound();
    }

    flashWord(currentTarget);
    updateUI();

    setTimeout(() => {
      locked = false;
      nextRound();
    }, 1450);
  }

  function endGame() {
    gameStarted = false;
    currentTarget = null;
    finalScore.textContent = `You got ${score} / ${words.length} stars!`;
    endOverlay.classList.remove("hidden");
  }

  function onFaceResults(results) {
    if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
      statusEl.textContent = gameStarted && !locked ? "Show your face 🙂" : statusEl.textContent;
      leftChoice.classList.remove("active");
      rightChoice.classList.remove("active");
      tiltDot.style.left = "50%";
      return;
    }

    const lm = results.multiFaceLandmarks[0];
    const leftEye = lm[33];
    const rightEye = lm[263];

    const dy = rightEye.y - leftEye.y;
    const dx = rightEye.x - leftEye.x;
    const angle = Math.atan2(dy, dx);

    const normalized = Math.max(-0.22, Math.min(0.22, angle));
    const dotPos = 50 + (normalized / 0.22) * 42;
    tiltDot.style.left = `${dotPos}%`;

    if (!gameStarted || locked) return;

    let side = null;

    // Mirrored video logic: positive/negative can feel reversed on different cameras.
    // This mapping is set for natural screen response. If needed, swap "left" and "right" below.
if (angle < -TILT_THRESHOLD) side = "right";
if (angle > TILT_THRESHOLD) side = "left";

    leftChoice.classList.toggle("active", side === "left");
    rightChoice.classList.toggle("active", side === "right");

    if (side) {
      const now = Date.now();
      if (!lastChoiceTime || lastChoiceTime.side !== side) {
        lastChoiceTime = { side, started: now };
      } else if (now - lastChoiceTime.started > HOLD_TIME) {
        chooseSide(side);
        lastChoiceTime = 0;
      }
    } else {
      lastChoiceTime = 0;
    }
  }

  async function startCameraAndGame() {
    startBtn.disabled = true;
    startBtn.textContent = "Loading...";

    try {
      faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
      });

      faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: false,
        minDetectionConfidence: 0.55,
        minTrackingConfidence: 0.55
      });

      faceMesh.onResults(onFaceResults);

      camera = new Camera(videoElement, {
        onFrame: async () => {
          await faceMesh.send({ image: videoElement });
        },
        width: 640,
        height: 480
      });

      await camera.start();
      startOverlay.classList.add("hidden");
      startGame();
    } catch (err) {
      console.error(err);
      startBtn.disabled = false;
      startBtn.textContent = "Start";
      alert("Camera could not start. Please allow camera access and use Chrome or Edge.");
    }
  }

  soundBtn.addEventListener("click", () => {
    if (currentTarget) speak(currentTarget.word);
  });

  startBtn.addEventListener("click", startCameraAndGame);

  againBtn.addEventListener("click", () => {
    endOverlay.classList.add("hidden");
    startGame();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft") chooseSide("left");
    if (e.key === "ArrowRight") chooseSide("right");
    if (e.key === " " && currentTarget) speak(currentTarget.word);
  });
</script>
</body>
</html>
